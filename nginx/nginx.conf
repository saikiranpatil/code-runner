events {}

http {
  include /etc/nginx/mime.types;

  limit_req_zone $binary_remote_addr zone=general_zone:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;
  limit_req_zone $binary_remote_addr zone=execute_zone:10m rate=6r/m;
  limit_conn_zone $binary_remote_addr zone=conn_zone:10m;
  limit_req_status 429;
  
  upstream backend {
    server server:3000;
  }

  server {
    listen 80;
    limit_conn conn_zone 20;

    location ~ ^/api/auth/(login|register) {
      limit_req zone=auth_zone burst=3 nodelay;
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/api/execute {
      limit_req zone=execute_zone burst=2 nodelay;
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 60s;
    }

    location ~ ^/api/ {
      limit_req zone=general_zone burst=20 nodelay;
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://frontend:80;
    }
  }
}