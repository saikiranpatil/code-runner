events {}                          # required block, even if empty

http {
  upstream express_servers {       # defines the pool of backend servers
    server server:3000;            # "server" is the docker-compose service name
  }                                # Compose handles DNS round-robin for replicas

  server {
    listen 80;                     # Nginx listens here for incoming requests

    location / {
      proxy_pass http://express_servers;          # forward to the pool
      proxy_http_version 1.1;                     # needed for keep-alive
      proxy_set_header Host $host;                # forward original Host header
      proxy_set_header X-Real-IP $remote_addr;   # forward client's real IP
      proxy_read_timeout 60s;                     # matches your job timeout
    }
  }
}