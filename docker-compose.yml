  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network

  redis-insight:
    image: redis/redisinsight:2.54
    ports:
      - "5540:5540"
    volumes:
      - redis-insight-data:/data
    networks:
      - app-network
    depends_on:
      - redis

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: code-runner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  redis-data:
  redis-insight-data:
  postgres-data:

networks:
  app-network: