services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
      - frontend
    networks:
      - app-network
  
  server:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: api-server
    deploy:
      replicas: 3
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/code-runner
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_URL: http://localhost
      CORS_ALLOWED_ORIGINS: http://localhost
      GITHUB_CALLBACK_URL: http://localhost/api/auth/github/callback
      GOOGLE_CALLBACK_URL: http://localhost/api/auth/google/callback
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    networks:
      - app-network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker-server
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/code-runner
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./frontend/.env
    environment:
      VITE_API_BASE_URL: http://localhost:80
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - app-network

  redis-insight:
    image: redis/redisinsight:2.54
    ports:
      - "5540:5540"
    volumes:
      - redis-insight-data:/data
    networks:
      - app-network
    depends_on:
      - redis

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: code-runner
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  redis-data:
  redis-insight-data:
  postgres-data:

networks:
  app-network: